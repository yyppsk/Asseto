<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A scroll-driven Paddock India racing experience built with Vite, React, and Three.js."
    />
    <meta name="theme-color" content="#f4f1e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#07090b" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/assets/images/logos/favicon%20pack/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logos/favicon%20pack/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logos/favicon%20pack/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/logos/favicon%20pack/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preload" as="image" type="image/webp" href="/assets/images/logos/paddock-india-wide-night.webp" />
    <script>
      (() => {
        try {
          const savedMode = window.localStorage?.getItem('paddockindia-environment-mode');
          document.documentElement.dataset.environment = savedMode === 'day' ? 'day' : 'night';
        } catch {
          document.documentElement.dataset.environment = 'night';
        }
      })();
    </script>
    <title>Paddock India</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
